<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DSA Login — Chrisland University Exeat</title>
  <link rel="stylesheet" href="auth.css"/>
</head>
<body class="auth-page">

  <div class="auth-brand">
    <img class="brand-logo-img" src="https://www.chrislanduniversity.edu.ng/images/cu-logo.png" alt="Chrisland University crest"/>
    <div class="brand-uni">Chrisland University</div>
    <h1 class="brand-title">DSA Portal</h1>
    <p class="brand-subtitle">Dean of Student Affairs — manage and approve all student exeat requests.</p>
    <div class="brand-divider"></div>
    <div class="brand-role-indicator">🔑 Staff Access</div>
  </div>

  <div class="auth-panel">
    <div class="auth-box">
      <h2>DSA Sign In</h2>
      <p class="auth-desc">Sign in with your official staff credentials to access the approval dashboard.</p>

      <div id="dsaError" class="alert alert-error hidden"></div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="dsaEmail" placeholder="dsa@chrisland.edu.ng"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="dsaPassword" placeholder="Enter your password"/>
      </div>
      <button class="btn-primary" onclick="dsaLogin()" id="dsaLoginBtn">Sign In →</button>

      <p class="auth-footer-note">Contact ICT admin if you need account access.</p>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/staff-auth.js"></script>
  <script>
    document.addEventListener('keydown', e => { if (e.key === 'Enter') dsaLogin(); });
  </script>
</body>
</html>
